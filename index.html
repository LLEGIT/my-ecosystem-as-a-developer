<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Ecosystem as a Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="public/styles.css">
</head>
<body>
  <div class="wrap">

      <div>

      <div style="text-align:right;color:var(--muted);font-size:0.9rem">Sober, static & native — D3 force layout</div>
